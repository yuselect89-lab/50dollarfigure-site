[build]
  publish = "."
  # Only deploy (and spend a credit) when the actual site output changed.
  # Exit code 0 = skip this build, non-zero = proceed.
  # Commits that only touch docs, scripts, workflows, etc. are skipped.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- index.html assets thanks.html"
