<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks! — $50 FIGURE</title>
<meta name="robots" content="noindex">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#F7F3EC;
    --ink:#171310;
    --tag-red:#D8232A;
    --tag-red-dark:#AD1B21;
    --gold:#E8A93B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    background:var(--paper);color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    padding:28px;
  }
  .box{
    max-width:480px;text-align:center;
    background:#fff;border:2px solid var(--ink);border-radius:14px;
    padding:44px 36px;box-shadow:8px 10px 0 rgba(23,19,16,0.9);
  }
  .badge{
    display:inline-block;background:var(--gold);color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:28px;
    line-height:1;padding:14px;border-radius:50%;margin-bottom:18px;
  }
  h1{font-family:'Reggae One',cursive;font-size:28px;margin:0 0 14px;}
  p{font-size:15px;line-height:1.65;margin:0 0 26px;color:#544c40;}
  a.cta{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--tag-red);color:#fff;text-decoration:none;
    font-weight:700;font-size:14px;padding:12px 26px;border-radius:999px;
    border:2px solid var(--tag-red-dark);
    transition:background .15s;
  }
  a.cta:hover{background:var(--tag-red-dark);}
</style>
</head>
<body>
  <div class="box">
    <span class="badge">✓</span>
    <h1>Request received!</h1>
    <p>We've got your outlet bundle request. We'll set up the combined listing and reach out within 24 hours &mdash; keep an eye on your eBay messages.</p>
    <a class="cta" href="/#outlet">&larr; Back to the site</a>
  </div>
</body>
</html>
